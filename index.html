<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="4" fill="#E2E8F0"/>
                    <path d="M6 8L12 16L18 8H6Z" fill="#1A202C"/>
                </svg>
                <h2>LeadPredictor to revert</h2>
            </div>

            <div class="form-group">
                <label>Language</label>
                <div class="input-with-prefix">
                    <img src="https://flagcdn.com/w20/us.png" alt="US Flag" style="position: absolute; left: 12px; width: 18px; border-radius: 2px; pointer-events: none;">
                    <select id="language" style="padding-left: 38px;">
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Currency</label>
                <select id="currency">
                    <option value="usd">$ US Dollar</option>
                </select>
            </div>

            <div class="form-group">
                <label>Campaign Start</label>
                <input type="date" id="camp-start" value="2026-05-08">
            </div>

            <div class="form-group">
                <label>Campaign End</label>
                <input type="date" id="camp-end" value="2026-11-04">
            </div>

            <div class="form-group">
                <label>Total Revenue</label>
                <div class="input-with-prefix">
                    <span>$</span>
                    <input type="number" id="revenue" value="10000" step="100">
                </div>
            </div>

            <div class="form-group">
                <label>Avg. Order Value</label>
                <div class="input-with-prefix">
                    <span>$</span>
                    <input type="number" id="aov" value="1000" step="10">
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-section">
                <div class="panel chart-panel">
                    <canvas id="forecastChart"></canvas>
                </div>
                
                <div class="kpi-panel">
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title"><span class="icon">📁</span> Prospects</span>
                            <span class="kpi-percent" id="pct-prospects">100%</span>
                        </div>
                        <div class="kpi-value" id="val-prospects">125</div>
                        <div class="progress-track">
                            <div class="progress-fill prospects-bg" id="bar-prospects-p" style="width: 100%;"></div>
                            <div class="progress-fill leads-bg" id="bar-prospects-l" style="width: 20%;"></div>
                            <div class="progress-fill customers-bg" id="bar-prospects-c" style="width: 8%;"></div>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title"><span class="icon">👤</span> Leads</span>
                            <span class="kpi-percent" id="pct-leads">20%</span>
                        </div>
                        <div class="kpi-value" id="val-leads">25</div>
                        <div class="progress-track">
                            <div class="progress-fill leads-bg" id="bar-leads-l" style="width: 20%;"></div>
                            <div class="progress-fill customers-bg" id="bar-leads-c" style="width: 8%;"></div>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title"><span class="icon">🏆</span> Customers</span>
                            <span class="kpi-percent" id="pct-customers">8%</span>
                        </div>
                        <div class="kpi-value" id="val-customers">10</div>
                        <div class="progress-track">
                            <div class="progress-fill customers-bg" id="bar-customers-c" style="width: 8%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-section">
                <div class="panel slider-panel">
                    <div class="slider-group">
                        <div class="slider-labels">
                            <label>Lead Response Rate</label>
                        </div>
                        <div class="range-wrapper">
                            <input type="range" id="lead-rate" min="1" max="100" step="1" value="40">
                        </div>
                        <div class="slider-value-right" id="val-lead-rate">40.00%</div>
                    </div>

                    <div class="slider-group">
                        <div class="slider-labels">
                            <label>Prospect Response Rate</label>
                        </div>
                        <div class="range-wrapper">
                            <input type="range" id="prospect-rate" min="1" max="100" step="1" value="20">
                        </div>
                        <div class="slider-value-right" id="val-prospect-rate">20.00%</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
